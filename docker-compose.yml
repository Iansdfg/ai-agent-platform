services:
  app:
    build:
      context: .
    image: ai-agent-platform:local
    ports:
      - "${PORT:-8000}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      APP_API_KEY: ${APP_API_KEY:-local-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-with-your-openai-api-key}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agent_platform
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RAG_DB_HOST: postgres
      RAG_DB_PORT: 5432
      RAG_DB_NAME: rag_db
      RAG_DB_USER: postgres
      RAG_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RAG_TABLE_NAME: ${RAG_TABLE_NAME:-documents}
      RAG_EMBED_DIM: ${RAG_EMBED_DIM:-1536}
      DOCS_DIR: docs
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
